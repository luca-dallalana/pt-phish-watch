<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1200px;
      height: 1200px;
      overflow: hidden;
      background: #0d1117;
      font-family: 'JetBrains Mono', monospace;
    }
    .canvas {
      width: 1200px;
      height: 1200px;
      background: #0d1117;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 100px;
      gap: 64px;
      position: relative;
    }
    .canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(88, 166, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(88, 166, 255, 0.025) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .eyebrow {
      font-size: 13px;
      color: #388bfd;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 500;
      position: relative;
    }
    .stats-row {
      display: flex;
      position: relative;
    }
    .stat-block {
      padding: 36px 56px;
      border: 1px solid #21262d;
      background: #161b22;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .stat-block:first-child { border-radius: 10px 0 0 10px; }
    .stat-block:last-child  { border-radius: 0 10px 10px 0; border-left: none; }
    .stat-block:not(:first-child):not(:last-child) { border-left: none; }
    .stat-number {
      font-size: 64px;
      font-weight: 700;
      color: #e6edf3;
      line-height: 1;
    }
    .stat-number.red  { color: #f85149; }
    .stat-number.blue { color: #58a6ff; }
    .stat-label {
      font-size: 13px;
      color: #484f58;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .cta-block { position: relative; }
    .cta-label {
      font-size: 13px;
      color: #484f58;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    .cta-url {
      font-size: 30px;
      font-weight: 600;
      color: #388bfd;
      margin-bottom: 16px;
    }
    .cta-url span { color: #6e7681; }
    .cta-desc {
      font-size: 16px;
      color: #484f58;
      line-height: 1.8;
    }
    .cta-desc strong { color: #8b949e; }
    .footer {
      position: absolute;
      bottom: 56px;
      right: 100px;
      font-size: 12px;
      color: #21262d;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .footer span { color: #388bfd; }
    .slide-num {
      position: absolute;
      bottom: 56px;
      left: 100px;
      font-size: 12px;
      color: #21262d;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="eyebrow">PT Phish Watch &nbsp;·&nbsp; Open Source</div>

    <div class="stats-row">
      <div class="stat-block">
        <span class="stat-number red">2,029</span>
        <span class="stat-label">Certs flagged</span>
      </div>
      <div class="stat-block">
        <span class="stat-number">7</span>
        <span class="stat-label">Dias</span>
      </div>
      <div class="stat-block">
        <span class="stat-number blue">7</span>
        <span class="stat-label">Marcas</span>
      </div>
    </div>

    <div class="cta-block">
      <div class="cta-label">Código e documentação</div>
      <div class="cta-url"><span>github.com/</span>luca-dallalana/pt-phish-watch</div>
      <p class="cta-desc">
        Domínios completos, infraestrutura mapeada, source code capturado.<br>
        <strong>Todos os findings verificados manualmente.</strong>
      </p>
    </div>

    <div class="slide-num">6 / 6</div>
    <div class="footer"><span>pt-phish-watch</span></div>
  </div>
</body>
</html>
